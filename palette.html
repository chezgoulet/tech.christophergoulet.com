<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette — tech.christophergoulet.com</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; font-family: system-ui, sans-serif; color: #ccc; line-height: 1.5; padding: 40px 24px; }
.wrap { max-width: 1000px; margin: 0 auto; }
h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
.sub { color: #888; margin-bottom: 40px; }
.sec { margin-bottom: 48px; }
.sec h2 { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 8px; }
.sec p.ref { font-size: 13px; color: #666; margin-top: -8px; margin-bottom: 20px; }
.row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.swatch { width: 160px; }
.s { height: 80px; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.06); }
.l { font-size: 13px; font-weight: 600; color: #fff; }
.h { font-size: 11px; color: #888; font-family: monospace; }
.tag { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.demo-card { background: #0a0b0d; border: 1px solid #222; border-radius: 8px; padding: 24px; margin-top: 20px; }
.demo-card h3 { font-size: 18px; margin-bottom: 6px; }
.demo-card .btn-row { display: flex; gap: 12px; margin: 16px 0 0; flex-wrap: wrap; }
.btn { padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 500; border: none; cursor: default; }
</style>
</head>
<body>
<div class="wrap">
<h1>🎨 tech.christophergoulet.com</h1>
<p class="sub">Color palette reference for the tech subdomain</p>
<div class="sec">
  <h2>Tech — Solarpunk Retro-Futurism</h2>
  <p class="ref">Warm, optimistic, organic-meets-technical. Copper and teal on dark background.</p>
  <div class="row">
    <div class="swatch">
      <div class="s" style="background:#c87a3f"></div>
      <div class="l">Copper A</div>
      <div class="h">#c87a3f &middot; rgb(200,122,63)</div>
      <div class="tag">primary accent candidate</div>
    </div>
</div>
</body>
</html>
